version: "2"
sql:
  - engine: "postgresql"
    schema: "./internal/migrations/schema"
    queries: "./internal/migrations/queries/"
    gen:
      go:
        out: "./internal/database"
        package: "database"
        sql_package: "pgx/v5"
        overrides:
          - db_type: "uuid"
            nullable: false
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "pg_catalog.timestamp"
            nullable: false
            go_type: "time.Time"
